<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VideoSave - Downloader</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.hero{
background:linear-gradient(135deg,#4a6cf7,#6a82fb);
color:white;
padding:80px 20px;
text-align:center;
}

input{
width:80%;
max-width:600px;
padding:12px;
border:none;
border-radius:5px;
}

button{
padding:12px 20px;
border:none;
background:#ff4757;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:20px;
}

.ad{
background:#ddd;
padding:20px;
margin:30px;
text-align:center;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>
<h1>VideoSave</h1>
<p>Download Video Facebook, Instagram, TikTok</p>
</header>

<section class="hero">

<h2>Download Video Instan</h2>

<p>Salin link video lalu klik download</p>

<input id="videoUrl" placeholder="Tempel link video disini">

<br>

<button onclick="download()">Download</button>

<div class="result" id="result"></div>

</section>

<div class="ad">
Tempat Iklan
</div>

<footer>

<p>© 2026 VideoSave</p>

</footer>

<script>

function download(){

let url=document.getElementById("videoUrl").value;

if(url==""){
alert("Masukkan link video dulu");
return;
}

document.getElementById("result").innerHTML=
"Memproses link: <br>"+url+
"<br><br><b>Server sedang mengambil video...</b>";

}

</script>

</body>
</html>
